<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="bolt" x1="0" y1="0" x2="0.3" y2="1">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Background rounded square -->
  <rect x="4" y="4" width="248" height="248" rx="48" ry="48" fill="url(#bg)" stroke="#2a2a4a" stroke-width="2"/>
  <!-- Lightning bolt -->
  <g filter="url(#glow)">
    <path d="M 148 32 L 76 136 L 116 136 L 108 224 L 180 120 L 140 120 Z" fill="url(#bolt)"/>
  </g>
  <!-- "Z" text -->
  <text x="128" y="252" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="0" fill="#fbbf24" text-anchor="middle" font-weight="700" opacity="0"/>
</svg>
