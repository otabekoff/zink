name: CI — Zink Lang

on:
  push:
    branches: [main]
    paths:
      - "lang/**"
  pull_request:
    branches: [main]
    paths:
      - "lang/**"

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build & Test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        rust: [stable]

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ matrix.rust }}
          components: clippy, rustfmt

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            lang/target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('lang/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Check formatting
        working-directory: lang
        run: cargo fmt --check

      - name: Clippy
        working-directory: lang
        run: cargo clippy -- -D warnings

      - name: Build
        working-directory: lang
        run: cargo build --release

      - name: Run tests
        working-directory: lang
        run: cargo test

      - name: Run examples
        working-directory: lang
        shell: bash
        run: |
          for f in examples/*.zink; do
            echo "--- Running $f ---"
            cargo run --release -- "$f"
          done

  release:
    name: Build Release Binaries
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: build
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: zink-linux-x64
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: zink-macos-arm64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: zink-windows-x64

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build release
        working-directory: lang
        run: cargo build --release --target ${{ matrix.target }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: lang/target/${{ matrix.target }}/release/zink${{ runner.os == 'Windows' && '.exe' || '' }}
