name: CI — Zink Playground

on:
  push:
    branches: [main]
    paths:
      - "playground/**"
  pull_request:
    branches: [main]
    paths:
      - "playground/**"

jobs:
  build:
    name: Lint & Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        working-directory: playground
        run: bun install

      - name: Lint
        working-directory: playground
        run: bun run lint

      - name: Type check & Build
        working-directory: playground
        run: bun run build
