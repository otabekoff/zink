name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    outputs:
      upload_url: ${{ steps.create.outputs.upload_url }}
      version: ${{ steps.version.outputs.version }}

    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        id: create
        uses: softprops/action-gh-release@v2
        with:
          name: Zink ${{ github.ref_name }}
          draft: false
          prerelease: ${{ contains(github.ref, '-alpha') || contains(github.ref, '-beta') || contains(github.ref, '-rc') }}
          body: |
            ## What's Included

            ### Zink Interpreter
            Complete interpreter with variables, functions, control flow, loops, and more.
            Available for **Linux** (x64), **macOS** (ARM64), and **Windows** (x64).

            ### VS Code Extension
            Syntax highlighting, snippets, and integrated REPL.
            Install the `.vsix` from the assets below.

            ### Browser Playground
            Try Zink directly at [otabekoff.github.io/zink/playground/](https://otabekoff.github.io/zink/playground/).

            ---
            **Full Changelog**: https://github.com/${{ github.repository }}/commits/${{ github.ref_name }}

  build-binaries:
    name: Build ${{ matrix.artifact }}
    needs: create-release
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: zink-linux-x64
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: zink-macos-arm64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: zink-windows-x64

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build release
        working-directory: lang
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          cd lang/target/${{ matrix.target }}/release
          tar czf ${{ matrix.artifact }}-${{ github.ref_name }}.tar.gz zink
          mv ${{ matrix.artifact }}-${{ github.ref_name }}.tar.gz ../../../../

      - name: Package (Windows)
        if: runner.os == 'Windows'
        run: |
          cd lang/target/${{ matrix.target }}/release
          Compress-Archive -Path zink.exe -DestinationPath ${{ matrix.artifact }}-${{ github.ref_name }}.zip
          Move-Item ${{ matrix.artifact }}-${{ github.ref_name }}.zip ../../../../

      - name: Upload Release Asset
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload ${{ github.ref_name }} ${{ matrix.artifact }}-${{ github.ref_name }}.* --clobber

  build-extension:
    name: Build VS Code Extension
    needs: create-release
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        working-directory: extension
        run: npm ci || npm install

      - name: Compile & Package
        working-directory: extension
        run: |
          npm run compile
          npx @vscode/vsce package

      - name: Upload VSIX to Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload ${{ github.ref_name }} extension/zink-lang-*.vsix --clobber
